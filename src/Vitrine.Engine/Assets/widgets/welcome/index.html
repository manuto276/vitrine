<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: transparent;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .widget {
      background: rgba(15, 15, 15, 0.72);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 22px 36px;
      text-align: center;
      color: #ffffff;
    }

    .widget h1 {
      font-size: 1.15rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      opacity: 0.92;
    }

    .widget span {
      display: block;
      font-size: 0.7rem;
      opacity: 0.35;
      margin-top: 6px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="widget">
    <h1>Benvenuto</h1>
    <span>Vitrine Engine</span>
  </div>
</body>
</html>
