<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .widget {
      background: rgba(15, 15, 15, 0.72);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 22px 28px;
      text-align: center;
      color: #ffffff;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .title { font-size: 1.15rem; font-weight: 400; letter-spacing: 0.04em; opacity: 0.92; }
    .subtitle { font-size: 0.7rem; opacity: 0.35; margin-top: 4px; letter-spacing: 0.12em; text-transform: uppercase; }

    .stats { display: flex; gap: 14px; margin-top: 16px; justify-content: center; }
    .stat { flex: 1; max-width: 80px; }
    .stat-label { font-size: 0.6rem; opacity: 0.4; text-transform: uppercase; letter-spacing: 0.1em; }
    .stat-value { font-size: 1rem; font-weight: 300; margin-top: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const h = React.createElement;

    function formatBytes(bytes) {
      return (bytes / 1073741824).toFixed(1);
    }

    function Welcome() {
      const [info, setInfo] = React.useState(null);

      React.useEffect(() => {
        if (!window.vitrine) return;
        window.vitrine.system.onUpdate(setInfo);
        window.vitrine.system.getInfo().then(setInfo);
      }, []);

      return h('div', { className: 'widget' },
        h('div', { className: 'title' }, 'Welcome'),
        h('div', { className: 'subtitle' }, 'Vitrine Engine'),
        info && h('div', { className: 'stats' },
          h('div', { className: 'stat' },
            h('div', { className: 'stat-label' }, 'CPU'),
            h('div', { className: 'stat-value' }, info.cpu.usage + '%')
          ),
          h('div', { className: 'stat' },
            h('div', { className: 'stat-label' }, 'RAM'),
            h('div', { className: 'stat-value' }, formatBytes(info.memory.used) + ' GB')
          ),
          info.drives && info.drives[0] && h('div', { className: 'stat' },
            h('div', { className: 'stat-label' }, 'Disk'),
            h('div', { className: 'stat-value' }, formatBytes(info.drives[0].free) + ' GB')
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(h(Welcome));
  </script>
</body>
</html>
